name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester and PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.5 -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -Force

      - name: No BOM in irm|iex scripts
        shell: pwsh
        run: |
          # install.ps1 / uninstall.ps1 are piped through `irm ... | iex`; a leading
          # UTF-8 BOM becomes a stray token and breaks param()/[CmdletBinding()] parsing.
          $bad = foreach ($f in 'install.ps1', 'uninstall.ps1') {
            $b = [IO.File]::ReadAllBytes("$PWD/$f")
            if ($b.Length -ge 3 -and $b[0] -eq 0xEF -and $b[1] -eq 0xBB -and $b[2] -eq 0xBF) { $f }
          }
          if ($bad) { throw "BOM found in: $($bad -join ', '). Save these as UTF-8 without BOM." }

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = @(Invoke-ScriptAnalyzer -Path ./PacLife -Recurse -Severity Warning, Error)
          # install.ps1 / uninstall.ps1 are piped through `irm ... | iex` and must stay
          # BOM-less (enforced by the "No BOM" step above), so PSUseBOMForUnicodeEncodedFile
          # is inapplicable to them — it directly contradicts that hard requirement.
          $results += @(Invoke-ScriptAnalyzer -Path ./install.ps1 -Severity Warning, Error -ExcludeRule PSUseBOMForUnicodeEncodedFile)
          $results += @(Invoke-ScriptAnalyzer -Path ./uninstall.ps1 -Severity Warning, Error -ExcludeRule PSUseBOMForUnicodeEncodedFile)
          $results | Format-Table RuleName, ScriptName, Line, Message -AutoSize
          if ($results) { throw "PSScriptAnalyzer found $($results.Count) issue(s)." }

      - name: Pester
        shell: pwsh
        run: |
          $result = Invoke-Pester ./tests -PassThru -Output Detailed
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) test(s) failed." }
